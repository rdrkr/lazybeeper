fail_fast: false
exclude: |
  (?x)^(
    \.idea/|
    \.git/|
    build/|
    coverage/|
    dist/|
    log\.txt|
    temp/|
    test-results/
  )
repos:
  # Security scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  # Copyright header enforcement (go, mod)
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
      - id: insert-license
        name: Check copyright headers (go, mod)
        files: \.(go|mod)$
        args:
          - --license-filepath
          - .copyright-header.txt
          - --comment-style
          - // # - /**|  *|  */
          - --allow-past-years
          - --detect-license-in-X-top-lines=3

  # Copyright header enforcement (yaml, md)
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
      - id: insert-license
        name: Check copyright headers (yaml)
        files: \.(yaml)$
        args:
          - --license-filepath
          - .copyright-header.txt
          - --comment-style
          - "|#|"
          - --allow-past-years
          - --detect-license-in-X-top-lines=3

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of file
      - id: check-yaml
        name: Check YAML
      - id: check-json
        name: Check JSON
      - id: check-toml
        name: Check TOML
      - id: check-xml
        name: Check XML
        exclude: .*\.svg$
      - id: detect-private-key
        name: Detect private keys
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: mixed-line-ending
        name: Fix mixed line endings
        args: [-f, lf]
      - id: check-case-conflict
        name: Check case conflicts

  # Markdown linting
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.21.0
    hooks:
      - id: markdownlint-cli2
        name: Fix Markdown
        args:
          - --format
          - --fix

  # Code formatters and linters (centralized via mise)
  - repo: local
    hooks:
      - id: format
        name: Format code (mise fmt)
        entry: bash -c 'mise run fmt'
        language: system
        pass_filenames: false
        always_run: true
      - id: lint
        name: Lint code (mise lint)
        entry: bash -c 'mise run lint'
        language: system
        pass_filenames: false
        always_run: true

version: "2"

linters:
  default: all

  disable:
    # exhaustruct requires all struct fields be set explicitly.
    # Go zero-value semantics makes this impractical for structs
    # with many optional fields or external library types.
    - exhaustruct

    # ireturn flags functions returning interfaces. The Popup interface
    # and tea.Msg are core to the Bubble Tea architecture pattern.
    - ireturn

    # Deprecated in favor of wsl_v5 (golangci-lint v2.2.0+).
    - wsl

  settings:
    depguard:
      rules:
        main:
          allow:
            - $gostd
            - github.com/rdrkr/lazybeeper
            - github.com/beeper/desktop-api-go
            - charm.land/bubbletea/v2
            - charm.land/bubbles/v2
            - charm.land/lipgloss/v2

    revive:
      severity: error
      enable-all-rules: true
      rules:
        # 80-char line limit is too restrictive for Go where long function
        # signatures, struct literals, and error returns are idiomatic.
        - name: line-length-limit
          disabled: true
        # Flagging magic numbers like 0, 1, 2 and empty strings creates
        # noise without improving readability in TUI layout code.
        - name: add-constant
          disabled: true
        # Mock implementations must have receivers to satisfy interfaces
        # even when the receiver is unused.
        - name: unused-receiver
          disabled: true
        # max-control-nesting at default (5) already catches real issues.
        # The linter triggers on idiomatic Bubble Tea switch nesting.
        - name: max-control-nesting
          arguments: [5]
        # flag-parameter triggers on interface methods that take bool params.
        # SetFocused(isFocused bool) is part of the Panel interface contract.
        - name: flag-parameter
          disabled: true

    cyclop:
      max-complexity: 20

    funlen:
      lines: 120
      statements: 60

    gocognit:
      min-complexity: 40

    gocyclo:
      min-complexity: 35

    lll:
      line-length: 130

    godoclint:
      require-doc:
        ignore-exported: false
        ignore-unexported: false
      start-with-name:
        include-unexported: true

    varnamelen: {}

    wsl_v5:
      allow-first-in-block: true

  exclusions:
    rules:
      # Global color variables are idiomatic in lipgloss TUI code.
      - linters: [gochecknoglobals]
        path: ui/shared/styles.go
      # The "shared" package name is used for cross-panel message types and styles,
      # which is a deliberate architectural choice, not a meaningless name.
      - linters: [revive]
        path: ui/shared/
        text: "var-naming: avoid meaningless package names"
      # Bubble Tea Update() and key handler functions are inherently complex type switches.
      - linters: [gocyclo, gocognit, cyclop]
        source: "func .+ (Update|handleKey|handleMouseClick)\\("
      # revive cyclomatic/cognitive complexity is handled by gocyclo/gocognit exclusions above.
      - linters: [revive]
        source: "func .+ (Update|handleKey|handleMouseClick|handleGlobalKeys|updateFocusedPanel|renderSearchContent)\\("
        text: "(cyclomatic|cognitive-complexity)"
      # Function length limits are too strict for struct-initializer and mock data functions.
      - linters: [funlen]
        source: "func Default(KeyMap|Styles)\\("
      - linters: [funlen, revive]
        path: data/mock/data.go
        text: "(function-length|funlen)"
      # wrapcheck is noisy for internal error propagation within the app.
      - linters: [wrapcheck]
        path: "(data|ui)/"
      # Magic number detector is too noisy for TUI layout and mock data.
      - linters: [mnd]
        path: "(ui/|domain/textutil/|data/mock/)"
      # noinlineerr is a stylistic preference; inline error checks are idiomatic.
      - linters: [noinlineerr]
        path: ".*\\.go"
      # prealloc micro-optimizations are not needed for small slices in TUI code.
      - linters: [prealloc]
        path: ".*\\.go"
      # funcorder conflicts with our convention of grouping Init/Update/View together.
      - linters: [funcorder]
        path: ".*\\.go"
      # modernize suggestions can conflict with readability.
      - linters: [modernize]
        path: ".*\\.go"

formatters:
  enable:
    - gofumpt

  settings:
    gofumpt:
      extra-rules: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  issues-exit-code: 1

severity:
  default: error
